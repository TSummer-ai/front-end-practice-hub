<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 元素选择器 */
      h1 {
        color: brown;
      }
      /* 类选择器 */
      .highlight {
        background-color: yellow;
      }
      /* ID选择器 */
      #header {
        font-size: 24px;
        color: green;
      }
      /* 全局选择器 */
      * {
        font-family: "KaiTi"; /*全局选择器，应用于所有元素，设置字体为楷体 */
      }
      /* 子元素选择器 */
      .father > .son {
        color: blue;
      }
      /* 后代选择器 (后代包括子元素，子元素不包括后代)*/
      .father p {
        color: purple;
        font-size: larger;
      }
      /* 相邻元素选择器 */
      h4 + p {
        color: rgb(255, 0, 119);
      }
      /* 伪类选择器 */
      #elem:hover {
        background-color: lightgray;
        color: red;
        cursor: pointer;
        /* 选中第一个子元素：first-child
                第n个子元素：nth-child(n)
                链接状态：active */
      }
      /* 伪元素选择器
       ::after
       ::before*/
    </style>
  </head>
  <body>
    <h1>不同类型的CSS选择器</h1>
    <h2>这是一个元素选择器实例</h2>
    <h2 class="highlight">这是一个类选择器实例</h2>
    <h3 id="header">这是一个ID选择器实例</h3>
    <div class="father">
      <p class="son">这是一个子元素选择器实例</p>
      <div>
        <p class="grandson">这是一个后代选择器实例</p>
      </div>
    </div>
    <hr />
    <p>这是一个p标签</p>
    <h4>这是一个相邻兄弟选择器标签</h4>
    <p>这是另一个p标签</p>
    <h4 id="elem">这是一个伪类选择器实例</h4>
  </body>
</html>
