<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html {
        font-size: 10px;
        /* font-size: 10px;//设置根元素字体大小为10px，方便计算 */
      }
      .container {
        display: flex;
        height: 40rem;
        background-color: aqua;
      }
      .item {
        width: 20rem;
        font-size: 8rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item" style="background-color: aliceblue">1</div>
      <div class="item" style="background-color: lightcoral">2</div>
      <div class="item" style="background-color: lightgreen">3</div>
      <div class="item" style="background-color: lightyellow">4</div>
      <div class="item" style="background-color: lightpink">5</div>
      <div class="item" style="background-color: lightgray">6</div>
    </div>
  </body>
</html>
